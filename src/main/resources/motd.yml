# FlowGate-Lite | motd.yml
# Plugin: FlowGate-Lite  |  Version: 1.0.5
#
# Supports legacy colors (&a, &c, &l, etc.) and HEX colors (&#RRGGBB).
# Max 2 lines are visible in the Minecraft server list.

# Active MOTD profile — must be a key under "motds"
motd: example

# MOTD profiles — switch active profile by changing the "motd" value above
motds:

  example:
    lines:
      - "&cLine 1"
      - "&fLine 2"
    enable-hover: true
    hover:
      - "&cMy Hover"

  maintenance:
    lines:
      - "&fLine 1"
      - "&cServer is currently in maintenance"
    enable-hover: true
    hover:
      - "&cServer offline"
      - "&7Check Discord for updates!"
