# FlowGate-Lite | config.yml
# Plugin: FlowGate-Lite  |  Version: 1.0.5
# https://github.com/terona-studios/FlowGate
#
# Hub and fallback servers MUST exist in your BungeeCord config.
# /flowgate reload applies most changes without a full restart.
# Server list changes (hubs / fallback) require a proxy restart.

debug:
  enabled: false

titles:
  enabled: true

# Hub servers the router distributes players across.
# Names must match entries in BungeeCord's config.yml.
hubs:
  - servername1
  - servername2
  - servername3

# Commands that send players to the best available hub (max 3).
hub-commands:
  - hub

# Routing behaviour
routing:
  enabled: true
  # Maximum routing attempts per limbo player before cooldown resets
  max-retries: 3
  # Minimum delay (ms) between successive routing attempts for one player
  retry-cooldown-ms: 5000
  # Consecutive ping failures before a hub is quarantined
  quarantine-threshold: 3
  # How long (ms) a quarantined server is skipped before being retried
  quarantine-duration-ms: 60000
  # Send returning players back to their last successful hub while it is healthy
  sticky-sessions: false
  # Sticky-session validity window (ms)
  sticky-session-ttl-ms: 300000

# Fallback / limbo server — players land here when no hub is reachable
fallback:
  enabled: true
  fallback-server: limbo-wait

# Player limits per hub
players:
  # Hard cap: hub is excluded from routing at or above this player count
  hub-max-players: 100
  # Soft cap: informational; reserved for future balancing hints
  hub-soft-limit: 50
  # Slots reserved from routing (effective cap = hub-max-players - reserved-slots)
  reserved-slots: 5

# How often (seconds) backends are pinged and limbo players are re-evaluated
check-interval-seconds: 10

# Optional per-server balancing weights.
# Score = playerCount / weight; lower score = preferred.
# A weight-2 hub absorbs roughly 2x the load of a weight-1 hub before scores equalise.
server-weights:
  servername1: 1
  servername2: 2

# Direct server commands: /commandName -> target-server
slash-servers:
  anarchy: anarchy-server
  dev: dev-server

# Human-readable display names used in messages (does not affect routing)
server-names:
  servername1: Hub 1
  servername2: Hub 2
